services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: renate_sales
      POSTGRES_USER: renate
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U renate -d renate_sales"]
      interval: 5s
      retries: 5

  playwright-browser:
    build:
      context: ./playwright-browser
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://renate:${DB_PASSWORD:-changeme}@db:5432/renate_sales
      PLAYWRIGHT_WS_ENDPOINT: ws://playwright-browser:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      playwright-browser:
        condition: service_started
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  pgdata:
